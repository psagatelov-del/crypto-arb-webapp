<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Арбитраж Dashboard</title>
    
    <!-- Подключаем Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Подключаем наши стили -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Главный контейнер -->
    <div class="app">
        
        <!-- Заголовок -->
        <header class="header">
            <h1>🚀 Арбитраж Dashboard</h1>
            <div class="update-time" id="updateTime">Загрузка...</div>
        </header>
        
        <!-- Статистика (карточки) -->
        <section class="stats">
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-value" id="positionsCount">-</div>
                <div class="stat-label">Позиций</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-value" id="totalProfit">-</div>
                <div class="stat-label">Прибыль</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon">🔔</div>
                <div class="stat-value" id="notifications">-</div>
                <div class="stat-label">Уведомлений</div>
            </div>
        </section>
        
        <!-- Табы -->
        <nav class="tabs">
            <button class="tab active" data-tab="positions">📊 Позиции</button>
            <button class="tab" data-tab="opportunities">🔥 ТОП</button>
            <button class="tab" data-tab="settings">⚙️ Настройки</button>
        </nav>
        
        <!-- Контент табов -->
        <main class="content">
            
            <!-- ТАБ 1: Позиции -->
            <div class="tab-content active" id="tab-positions">
                <div class="positions-list" id="positionsList">
                    <!-- Позиции будут добавлены через JavaScript -->
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Загрузка позиций...</p>
                    </div>
                </div>
            </div>
            
            <!-- ТАБ 2: ТОП возможности -->
            <div class="tab-content" id="tab-opportunities">
                <div class="opportunities-list" id="opportunitiesList">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Загрузка возможностей...</p>
                    </div>
                </div>
            </div>
            
            <!-- ТАБ 3: Настройки -->
            <div class="tab-content" id="tab-settings">
                <div class="settings">
                    <h2>⚙️ Настройки</h2>
                    
                    <div class="setting-item">
                        <label>Интервал обновления</label>
                        <select id="updateInterval">
                            <option value="1000">1 секунда</option>
                            <option value="3000" selected>3 секунды</option>
                            <option value="5000">5 секунд</option>
                            <option value="10000">10 секунд</option>
                        </select>
                    </div>
                    
                    <div class="setting-item">
                        <label>Минимум прибыли ТОП</label>
                        <input type="number" id="minProfit" value="1.5" step="0.1" min="0">
                        <span>%</span>
                    </div>
                    
                    <div class="setting-item">
                        <label>Тёмная тема</label>
                        <input type="checkbox" id="darkMode" class="toggle">
                    </div>
                    
                    <button class="btn-primary" id="saveSettings">💾 Сохранить</button>
                    
                    <div class="version-info">
                        <p>Версия: v2.04.13</p>
                        <p>Обновлено: 14.01.2025</p>
                    </div>
                </div>
            </div>
            
        </main>
        
    </div>
    
    <!-- Подключаем наш JavaScript -->
    <script src="app.js"></script>
</body>
</html>
